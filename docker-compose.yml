services:
  account-service:
    build:
      context: .
    command:
      - uvicorn
      - account_service.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
    environment:
      ACCOUNT_SERVICE_DATABASE_URL: sqlite:////data/account_service.db
    volumes:
      - account-service-data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  event-gateway:
    build:
      context: .
    command:
      - uvicorn
      - event_gateway.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      EVENT_GATEWAY_DATABASE_URL: sqlite:////data/event_gateway.db
      ACCOUNT_SERVICE_URL: http://account-service:8001
      ACCOUNT_SERVICE_TIMEOUT_SECONDS: "2.0"
      ACCOUNT_SERVICE_RETRY_ATTEMPTS: "3"
      ACCOUNT_SERVICE_RETRY_BACKOFF_SECONDS: "0.1"
    ports:
      - "8000:8000"
    volumes:
      - event-gateway-data:/data
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  account-service-data:
  event-gateway-data:
